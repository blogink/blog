# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 雨梦清欢
subtitle: 不受律束，笔随兴至
description: 学习记录与分享，本博客随缘更新。
keywords: 雨梦清欢,Sakurink,个人主页,主页,博客,Blog,记录,分享,心得,日志,网络,代码,网站,科技
author: Ranmo
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://blog.sakurink.eu.org
#permalink: :year/:month/:day/:title/
#permalink_defaults:
permalink: posts/:abbrlink/
abbrlink:
  alg: crc32 #support crc16(default) and crc32
  rep: dec   #support dec(default) and hex
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - "editormd/**"
  - "music/*"

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: false
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# 搜索
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
## 默认landscape
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/blogink/blog # git@github.com:blogink/blog.git
  # example, https://github.com/hexojs/hexojs.github.io
  branch: main

# 加密部分文章/版块
# 单篇文章开头：
#  password: 是该博客加密使用的密码
#  abstract: 是该博客的摘要，会显示在博客的列表页
#  message: 这个是博客查看时，密码输入框上面的描述性文字
encrypt:
  enable: false

# 日历
calendar:
  single: true
  root: calendar/

# live2d
live2d:
  enable: true
  scriptFrom: local
  model: 
    use: live2d-widget-model-koharu #模型选择
  display: 
    position: right  #模型位置
    width: 120       #模型宽度
    height: 240      #模型高度
    hOffset: 20
    vOffset: -55
  mobile: 
    show: false      #是否在手机端显示
  react:
    opacity: 0.8

# APlayer
aplayer:
  meting: true
  asset_inject: false

# RSS
feed:
  enable: true #是否启用插件
  type: atom #有atom和rss2两个选项，使用默认atom就好了
  path: atom.xml #也用默认配置atom.xml就行
  limit: 15 #展示文章的数量,使用 0 或 false 代表展示全部
  hub: #这个我没用上，根据官网，空着就行
  content: #默认是false，true的话会在rss文件中包含整个文章内容
  content_limit: 100 #摘要长度
  content_limit_delim: ' ' #没看明白官方的意思，就跟着默认不填了
  order_by: -date #采用日期进行排序
  icon: icon.png #给rss链接配置icon
  autodiscovery: true #自动发现提要
  template: #给rss文章配置模板

# offline config passed to sw-precache.若不使用请npm uninstall hexo-offline-popup
# 教程：【https://colsrch.cn/posts/32c8ba21/】
# service_worker:
#   maximumFileSizeToCacheInBytes: 5242880
#   staticFileGlobs:
#   - public/**/*.{js,html,css,png,jpg,webp,jpeg,gif,svg,eot,ttf,woff,woff2}
#   stripPrefix: public
#   verbose: true
#   runtimeCaching:
#     - urlPattern: /*   # 子路径（接受通配符）
#       handler: cacheFirst
#       options:
#         origin: cdn.jsdelivr.net  # 域名
#     - urlPattern: /*  # 子路径（接受通配符）
#       handler: cacheFirst
#       options:
#         origin: api.sakurink.eu.org  # 域名
#
# 配置版本二，参考【https://akilar.top/posts/8f31c3d0/】的部分内容
service_worker:
  maximumFileSizeToCacheInBytes: 5242880 # 缓存的最大文件大小，以字节为单位，此处设置为3MB。
  staticFileGlobs:
    - public/**/*.{js,html,xml,css,png,jpg,gif,svg,webp,eot,ttf,woff,woff2}
    # - public/**/*.{html,xml} #精简版使用这行即可
  # 静态文件合集，如果你的站点使用了例如webp格式的文件，请将文件类型添加进去。。
  # 注意，此处的文件类型就是会缓存下来的所有文件类型，如果不需要缓存那么多，
  # 而只是想判断网页更新与否，缓存html和xml即可。
  stripPrefix: public
  verbose: true
  runtimeCaching:
    # CDNs - should be cacheFirst, since they should be used specific versions so should not change
    # - urlPattern: /* # 如果你需要加载CDN資源，请配置该选项，如果沒有，可以不配置。
    #   handler: cacheFirst
    #   options:
    #     origin: api.sakurink.eu.org # 又拍云
    - urlPattern: /*
      handler: cacheFirst
      options:
        origin: cdn.jsdelivr.net # jsdelivr
    # 更多cdn可自行参照上述格式进行配置。