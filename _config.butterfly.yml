valine:
  appId: # XEAgrKa587JWhdT1XrC0GqFn-MdYXbMMI # leancloud application app id
  appKey: # G2K2K8witS9F94vjfJOI3znS # leancloud application app key
  avatar: # monsterid # gravatar style https://valine.js.org/#/avatar
